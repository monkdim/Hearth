name: Hearth
options:
  bundleIdPrefix: com.colbydimaggio
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: 2.29.1
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 1.0.0
targets:
  Hearth:
    type: application
    platform: macOS
    sources:
      - path: Hearth
        excludes:
          - "Resources/Info.plist"
    dependencies:
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
      - package: MLXSwiftExamples
        product: StableDiffusion
      - package: MarkdownUI
        product: MarkdownUI
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_NAME: Hearth
        PRODUCT_BUNDLE_IDENTIFIER: com.colbydimaggio.hearth
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Hearth/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Hearth/Resources/Hearth.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          GCC_OPTIMIZATION_LEVEL: "s"
          DEAD_CODE_STRIPPING: YES
